name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Run on the merge-queue branch so the single required `ci-ok` check reports
  # there too — without this the queue would deadlock waiting for a check that
  # never runs.
  merge_group:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Verify package contents
        run: |
          FILES="$(npm pack --dry-run --json 2>/dev/null \
            | node -e "const d=JSON.parse(require('fs').readFileSync(0,'utf8')); console.log(d[0].files.map(f=>f.path).join('\n'))")"
          echo "Packed files:"
          echo "$FILES"
          if ! echo "$FILES" | grep -q '^dist/'; then
            echo "::error::npm pack does not contain any dist/ files — did the build run?"
            exit 1
          fi
          if echo "$FILES" | grep -q '^src/'; then
            echo "::error::npm pack unexpectedly contains src/ files — check the \"files\" field in package.json"
            exit 1
          fi
          echo "Package contents OK: dist/ present, no src/ leaked into the tarball"

      - name: Bundle size guard (tree-shaking)
        run: |
          # Prove the lazy-loading / tree-shaking contract:
          #   (a) the root `init` entry pulls neither faro-react nor the
          #       OpenTelemetry tracing tree (tracing is a lazy import()); and
          #   (b) the `@nais/apm/react` ErrorBoundary entry pulls no OpenTelemetry
          #       tracing tree. A failure of (b) is the trigger for the
          #       hand-rolled-ErrorBoundary contingency.
          set -euo pipefail
          FIX="$(mktemp -d)"
          printf "import { init } from '%s/dist/index.js';\nconsole.log(init);\n" "$PWD" > "$FIX/a.js"
          printf "import { ApmErrorBoundary } from '%s/dist/react/index.js';\nconsole.log(ApmErrorBoundary);\n" "$PWD" > "$FIX/b.js"
          pnpm exec esbuild "$FIX/a.js" "$FIX/b.js" \
            --bundle --splitting --format=esm --outdir="$FIX/out" --log-level=error

          fail=0
          if grep -Eq '@opentelemetry|TracingInstrumentation' "$FIX/out/a.js"; then
            echo "::error::(a) root init entry statically pulls the OpenTelemetry tracing tree — tracing must stay a lazy import()"
            fail=1
          fi
          if grep -Eq '@grafana/faro-react|ReactIntegration' "$FIX/out/a.js"; then
            echo "::error::(a) root init entry pulls faro-react — the React entry must stay separate"
            fail=1
          fi
          if grep -Eq '@opentelemetry|TracingInstrumentation' "$FIX/out/b.js"; then
            echo "::error::(b) @nais/apm/react ErrorBoundary entry pulls the OpenTelemetry tracing tree — see the hand-rolled ErrorBoundary contingency"
            fail=1
          fi
          if [ "$fail" -ne 0 ]; then
            exit 1
          fi
          echo "Bundle size guard OK: init entry is faro-react/OTel-free; react ErrorBoundary entry is OTel-free"

  commitlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need the full range base..head to lint every commit in the PR.
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Enforce Conventional Commits so release-please's version inference stays
      # trustworthy. This only runs on real PRs: on `merge_group` the base/head
      # PR SHAs are null, and the commits were already linted on their PR, so the
      # step skips and the job succeeds.
      - name: Lint PR commit messages
        if: github.event_name == 'pull_request'
        run: >
          pnpm exec commitlint
          --from "${{ github.event.pull_request.base.sha }}"
          --to "${{ github.event.pull_request.head.sha }}"
          --verbose

  # Single required status check. It aggregates every other job so the branch
  # ruleset needs to require only `ci-ok`, and it reports identically on
  # `pull_request` and `merge_group`. `if: !cancelled()` makes it run even when a
  # need failed, so it can turn that into a definitive failure.
  ci-ok:
    runs-on: ubuntu-latest
    needs: [test, commitlint]
    if: ${{ !cancelled() }}
    steps:
      - name: Aggregate job results
        run: |
          echo "test:       ${{ needs.test.result }}"
          echo "commitlint: ${{ needs.commitlint.result }}"
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "::error::One or more required jobs failed or were cancelled."
            exit 1
          fi
          echo "All required jobs succeeded or were skipped — ci-ok passes."
