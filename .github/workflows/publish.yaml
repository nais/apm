name: Publish

on:
  release:
    types: [published]

# NOTE ON npm PROVENANCE (--provenance):
# We intentionally do NOT pass `--provenance` here and do NOT request the
# `id-token: write` permission. npm build provenance/attestations are a feature
# of the public npm registry (registry.npmjs.org): the CLI uploads a Sigstore
# attestation bundle to the registry's attestation API, which stores it, logs it
# in the public transparency ledger, and renders the "provenance" badge on the
# npmjs.com package page. GitHub Package Registry (npm.pkg.github.com) does not
# implement that attestation API, so publishing with `--provenance` to GHPR does
# not produce a usable/verifiable attestation. Adding the flag here would be
# cargo-culting. If/when @nais/apm moves to npmjs.org, re-add `id-token: write`
# below and `--provenance` to the publish step. If GHPR-native attestations are
# wanted before then, GitHub's own `actions/attest-build-provenance` action is
# the correct mechanism (separate from npm provenance) and can be added later.
permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: '@nais'

      - name: Verify package version matches release tag
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG="${{ github.event.release.tag_name }}"
          EXPECTED="${TAG#v}"
          if [ "$PKG_VERSION" != "$EXPECTED" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match release tag $TAG (expected $EXPECTED). Bump the version in a PR before creating the release."
            exit 1
          fi
          echo "package.json version $PKG_VERSION matches release tag $TAG"

      - name: Determine npm dist-tag
        id: disttag
        run: |
          if [ "${{ github.event.release.prerelease }}" = "true" ]; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
            echo "Pre-release: publishing under dist-tag 'next'"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "Stable release: publishing under dist-tag 'latest'"
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Publish to GitHub Package Registry
        run: pnpm publish --no-git-checks --tag ${{ steps.disttag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
