name: Commitlint

# Enforce Conventional Commits on every PR. release-please infers the next version
# and generates the CHANGELOG from these commit types, so this gate keeps that
# inference trustworthy.
on:
  pull_request:
    branches: [main]
  # Run on merge queue branches so the required `commitlint` check reports there.
  merge_group:

permissions:
  contents: read

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need the full range base..head to lint every commit in the PR.
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint PR commit messages
        # PR-only: merge_group has no pull_request payload for the commit range,
        # and the commits were already linted on the PR. On the queue this step
        # skips, so the job still succeeds and the required check reports green.
        if: github.event_name == 'pull_request'
        run: >
          pnpm exec commitlint
          --from "${{ github.event.pull_request.base.sha }}"
          --to "${{ github.event.pull_request.head.sha }}"
          --verbose
